name: Trigger Cloudflare Pages deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ping deploy hook
        run: |
          curl -fsSL -X POST -d "" "$CF_DEPLOY_HOOK"
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
