<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>d4b — pick a variant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#111;color:#eee;font-family:"JetBrains Mono",monospace;font-size:13px;display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;padding:28px 32px;gap:24px}
  h1{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;font-size:clamp(28px,4vw,44px);letter-spacing:-.01em}
  header{display:flex;justify-content:space-between;align-items:baseline;color:#888;text-transform:uppercase;letter-spacing:.1em;font-size:11px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;align-content:start}
  @media(max-width:720px){.grid{grid-template-columns:1fr}}
  .tile{position:relative;border:1px solid #2a2a2a;overflow:hidden;aspect-ratio:16/10;display:block;text-decoration:none;color:inherit;transition:border-color .2s,transform .2s}
  .tile:hover{border-color:#888;transform:translateY(-2px)}
  .tile iframe{width:200%;height:200%;border:0;transform:scale(.5);transform-origin:top left;pointer-events:none}
  .meta{position:absolute;inset:auto 0 0 0;background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);padding:20px 18px 14px;display:flex;justify-content:space-between;align-items:end;color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.14em}
  .meta b{font-weight:500}
  .meta span{color:#9cf}
  footer{color:#666;font-size:11px;text-transform:uppercase;letter-spacing:.1em;display:flex;justify-content:space-between}
  footer a{color:inherit}
</style>
</head>
<body>
  <header>
    <span>d4b.online · chooser</span>
    <span>pick one →</span>
  </header>
  <main>
    <h1 style="margin-bottom:18px">Cztery kierunki. Kliknij żeby zobaczyć.</h1>
    <div class="grid">
      <a class="tile" href="/v1/">
        <iframe src="/v1/" loading="lazy" title="Monument"></iframe>
        <div class="meta"><b>v1 · Monument</b><span>serif · cream</span></div>
      </a>
      <a class="tile" href="/v2/">
        <iframe src="/v2/" loading="lazy" title="Signal"></iframe>
        <div class="meta"><b>v2 · Signal</b><span>glow · rounded</span></div>
      </a>
      <a class="tile" href="/v3/">
        <iframe src="/v3/" loading="lazy" title="Press"></iframe>
        <div class="meta"><b>v3 · Press</b><span>editorial · italic</span></div>
      </a>
      <a class="tile" href="/v4/">
        <iframe src="/v4/" loading="lazy" title="Console"></iframe>
        <div class="meta"><b>v4 · Console</b><span>terminal · phosphor</span></div>
      </a>
    </div>
  </main>
  <footer>
    <span>d4b</span>
    <a href="mailto:janusz.maciejewski@gmail.com">janusz.maciejewski@gmail.com</a>
  </footer>
</body>
</html>
