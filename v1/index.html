<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>d4b — Monument</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Newsreader:ital,opsz,wght@0,6..72,300..500;1,6..72,300..500&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#ece6d7; --ink:#141414; --dim:#6b6253; --accent:#8a2e20; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"Newsreader",Georgia,serif;font-weight:350;display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;padding:28px 32px;letter-spacing:.005em}
  header,footer{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--dim);font-style:italic}
  main{display:grid;place-items:center;text-align:center;padding:24px 0}
  .mark{font-family:"Gloock",serif;font-size:clamp(140px,26vw,340px);line-height:.85;letter-spacing:-.04em;color:var(--ink)}
  .mark em{font-style:italic;color:var(--accent)}
  .tag{margin-top:18px;font-size:clamp(16px,1.6vw,19px);font-style:italic;color:var(--ink);max-width:36ch;margin-left:auto;margin-right:auto}
  .cta{margin-top:36px;display:inline-block;font-size:15px;border-bottom:1px solid var(--ink);padding-bottom:3px;color:var(--ink);text-decoration:none;transition:color .2s,border-color .2s}
  .cta:hover{color:var(--accent);border-color:var(--accent)}
  footer a{color:inherit;text-decoration:none}
  footer a:hover{color:var(--accent)}
  .back{position:fixed;top:24px;left:28px;font-size:12px;color:var(--dim);text-decoration:none;letter-spacing:.05em}
  .back:hover{color:var(--accent)}
</style>
</head>
<body>
  <a class="back" href="/">← wybierz inny</a>
  <header><span>d4b · software studio</span><span>2026</span></header>
  <main>
    <div>
      <h1 class="mark">d<em>4</em>b</h1>
      <p class="tag">Considered software, built by a small hand.</p>
      <a class="cta" href="mailto:janusz.maciejewski@gmail.com">Start a conversation →</a>
    </div>
  </main>
  <footer><span>Janusz Maciejewski</span><a href="mailto:janusz.maciejewski@gmail.com">janusz.maciejewski@gmail.com</a></footer>
</body>
</html>
