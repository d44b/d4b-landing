<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>d4b — Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0a0a0f;--ink:#f5f3ef;--dim:#7a7a85;--accent:#6cf;--glow:0 0 60px rgba(102,204,255,.35)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);font-family:"JetBrains Mono",monospace;display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;padding:28px 36px;position:relative}
  body::before{content:"";position:fixed;inset:-20%;background:radial-gradient(600px circle at 30% 40%,rgba(102,204,255,.18),transparent 50%),radial-gradient(500px circle at 75% 70%,rgba(200,120,255,.12),transparent 55%);pointer-events:none}
  header,footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--dim);position:relative;z-index:2}
  header .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:8px;box-shadow:var(--glow);animation:p 2s infinite}
  @keyframes p{50%{opacity:.4}}
  main{display:grid;place-items:center;text-align:center;position:relative;z-index:2}
  .mark{font-family:"Unbounded",sans-serif;font-weight:500;font-size:clamp(100px,22vw,280px);line-height:.9;letter-spacing:-.05em;background:linear-gradient(180deg,#fff 0%,#9ac4ff 60%,#6cf 100%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 40px rgba(102,204,255,.3))}
  .tag{margin-top:24px;font-size:13px;text-transform:uppercase;letter-spacing:.24em;color:var(--dim)}
  .tag b{color:var(--ink);font-weight:500}
  .cta{margin-top:40px;display:inline-flex;align-items:center;gap:10px;font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--bg);background:var(--accent);padding:14px 22px;border-radius:999px;text-decoration:none;transition:transform .2s,box-shadow .2s}
  .cta:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(102,204,255,.4)}
  footer a{color:inherit;text-decoration:none}
  footer a:hover{color:var(--accent)}
  .back{position:fixed;top:28px;left:36px;font-size:11px;color:var(--dim);text-decoration:none;letter-spacing:.18em;text-transform:uppercase;z-index:3}
  .back:hover{color:var(--accent)}
</style>
</head>
<body>
  <a class="back" href="/">← back</a>
  <header><span><i class="dot"></i>online</span><span>d4b.online</span></header>
  <main>
    <div>
      <h1 class="mark">d4b</h1>
      <p class="tag"><b>software studio</b> · platforms · integrations</p>
      <a class="cta" href="mailto:janusz.maciejewski@gmail.com">Get in touch</a>
    </div>
  </main>
  <footer><span>© 2026</span><a href="mailto:janusz.maciejewski@gmail.com">janusz.maciejewski@gmail.com</a></footer>
</body>
</html>
