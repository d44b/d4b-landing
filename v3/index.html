<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>d4b — Press</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#fafaf7;--ink:#0b0b0b;--dim:#555;--accent:#e34d1c}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Mono",monospace;display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;padding:24px 32px}
  .rule{height:1px;background:var(--ink)}
  header{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--ink);font-size:11px;text-transform:uppercase;letter-spacing:.1em}
  header .c{text-align:center}
  header .r{text-align:right;color:var(--dim)}
  main{display:grid;place-items:center;text-align:center;padding:40px 0}
  .mark{font-family:"Instrument Serif",serif;font-style:italic;font-size:clamp(160px,30vw,400px);line-height:.82;letter-spacing:-.04em;color:var(--ink)}
  .mark .n{font-family:"IBM Plex Mono",monospace;font-style:normal;font-size:.55em;vertical-align:.15em;color:var(--accent);font-weight:500;letter-spacing:0;margin:0 .02em}
  .tag{margin-top:28px;font-family:"Instrument Serif",serif;font-size:clamp(20px,2.4vw,30px);font-style:italic;line-height:1.3;max-width:28ch;margin-left:auto;margin-right:auto;color:var(--ink)}
  .cta{margin-top:36px;display:inline-block;font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--accent);border:1px solid var(--accent);padding:13px 20px;text-decoration:none;transition:all .2s}
  .cta:hover{background:var(--accent);color:var(--bg)}
  footer{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:20px;padding-top:14px;border-top:1px solid var(--ink);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
  footer a{color:inherit;text-decoration:none}
  footer a:hover{color:var(--accent)}
  footer .c{text-align:center}
  footer .r{text-align:right}
  .back{position:fixed;top:24px;left:32px;font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--dim);text-decoration:none}
  .back:hover{color:var(--accent)}
</style>
</head>
<body>
  <a class="back" href="/">← index</a>
  <header>
    <span>Vol. I · No. 01</span>
    <span class="c">— d4b —</span>
    <span class="r">d4b.online</span>
  </header>
  <main>
    <div>
      <h1 class="mark">d<span class="n">4</span>b</h1>
      <p class="tag">An independent software studio. <br>Built slowly, with attention.</p>
      <a class="cta" href="mailto:janusz.maciejewski@gmail.com">Write to us →</a>
    </div>
  </main>
  <footer>
    <span>Janusz Maciejewski</span>
    <span class="c">Warsaw · Remote</span>
    <a class="r" href="mailto:janusz.maciejewski@gmail.com">janusz.maciejewski@gmail.com</a>
  </footer>
</body>
</html>
